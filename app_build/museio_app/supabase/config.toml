project_id = "museio-local"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000", "exp://127.0.0.1:8081"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[storage]
enabled = true
file_size_limit = "20MiB"
