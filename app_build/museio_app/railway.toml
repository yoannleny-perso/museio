[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter ./packages/types build && pnpm --filter ./packages/validation build && pnpm --filter ./packages/domain build && pnpm --filter ./packages/ui build && pnpm --filter ./apps/api build"
watchPatterns = [
  "/app_build/museio_app/apps/api/**",
  "/app_build/museio_app/packages/**",
  "/app_build/museio_app/package.json",
  "/app_build/museio_app/pnpm-lock.yaml",
  "/app_build/museio_app/pnpm-workspace.yaml",
  "/app_build/museio_app/tsconfig.base.json"
]

[deploy]
startCommand = "pnpm --filter @museio/api start:prod"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10